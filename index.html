<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server Ping Dashboard</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1117">
    
    <!-- iOS support -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-status-bar" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="style.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- OneSignal SDK for Web Push -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "b3890c1e-3cdf-4740-aaac-e05b5515fb5f",
        });
      });
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Server Status</h1>
                <p class="subtitle" id="last-updated">Waiting for data...</p>
            </div>
            <!-- OneSignal Bell Icon for subscribing will automatically inject if needed, or we can use custom button -->
            <button id="notify-btn" class="notify-btn">Enable Alerts</button>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Servers</h3>
                <p class="stat-value" id="total-count">0</p>
            </div>
            <div class="stat-card online-stat">
                <h3>Online</h3>
                <p class="stat-value" id="online-count">0</p>
            </div>
            <div class="stat-card offline-stat">
                <h3>Offline</h3>
                <p class="stat-value" id="offline-count">0</p>
            </div>
        </div>

        <div class="server-grid" id="server-grid">
            <!-- Server cards will be injected here via JavaScript -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
